name: Pub CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    name: Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Convex codegen
        run: pnpm convex codegen
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - name: Convex deploy (dry-run)
        run: pnpm convex deploy --dry-run -y --codegen disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm knip

  e2e-fullstack:
    name: Full-Stack E2E
    runs-on: ubuntu-latest
    needs: [web]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build E2E images
        run: docker compose -f tests/e2e/docker-compose.yml build
      - name: Start Convex backend and generate admin key
        run: |
          docker compose -f tests/e2e/docker-compose.yml up -d convex-backend
          for i in $(seq 1 30); do
            curl -sf http://localhost:3210/version > /dev/null && break
            sleep 2
          done
          CONTAINER_ID=$(docker ps -qf 'ancestor=ghcr.io/get-convex/convex-backend:latest')
          echo "ADMIN_KEY=$(docker exec "$CONTAINER_ID" ./generate_admin_key.sh)" >> "$GITHUB_ENV"
      - name: Run full-stack E2E tests
        run: docker compose -f tests/e2e/docker-compose.yml up --abort-on-container-exit --exit-code-from test-runner
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fullstack
          path: playwright-report/
          retention-days: 7
      - name: Cleanup Docker
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v --remove-orphans

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Smoke test
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ACTUAL=$(PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --version)
          test "$ACTUAL" = "$VERSION"
          PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --help >/dev/null
      - name: Smoke test (daemon code path)
        run: |
          OUTPUT=$(PUB_DAEMON_MODE=1 ./dist-bin/pub-linux-x64 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "require.*polyfill\|cannot find\|module not found\|not resolve"; then
            echo "FAIL: daemon code path has missing/broken imports"
            exit 1
          fi
          echo "$OUTPUT" | grep -q "Missing PUB_DAEMON_BRIDGE_SETTINGS"
