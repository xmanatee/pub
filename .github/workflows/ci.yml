name: Pub CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Web + Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Convex codegen
        run: pnpm convex codegen
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - name: Convex deploy (dry-run)
        run: pnpm convex deploy --dry-run -y --codegen disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - run: pnpm build:web
      - run: pnpm build:super-app
      - run: pnpm lint:root
      - run: pnpm lint:web
      - run: pnpm lint:super-app
      - run: pnpm test:root
      - run: pnpm test:web
      - run: pnpm test:super-app
      - run: pnpm test:ip-compat
      - run: pnpm audit
      - run: pnpm knip

  e2e-fullstack:
    name: Full-Stack E2E
    runs-on: ubuntu-latest
    needs: [web]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Convex codegen
        run: pnpm convex codegen
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - name: Build E2E images
        run: docker compose -f tests/e2e/docker-compose.yml build
      - name: Start E2E dependencies and generate admin key
        run: |
          docker compose -f tests/e2e/docker-compose.yml up -d --wait --wait-timeout 60 convex-backend turn-server
          for i in $(seq 1 30); do
            curl -sf http://localhost:3210/version > /dev/null && break
            sleep 2
          done
          docker compose -f tests/e2e/docker-compose.yml up admin-key-gen
      - name: Run full-stack E2E tests
        run: docker compose -f tests/e2e/docker-compose.yml up --no-deps --abort-on-container-exit --exit-code-from test-runner test-runner
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-fullstack
          path: playwright-report/
          retention-days: 7
      - name: Cleanup Docker
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down -v --remove-orphans

  relay:
    name: Relay (Cloudflare Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:relay
      - run: pnpm build:relay
      - name: Deploy to Cloudflare
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: relay

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:cli
      - run: pnpm test:cli
      - run: pnpm build:cli
      - name: Smoke test
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ACTUAL=$(PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --version)
          test "$ACTUAL" = "$VERSION"
          PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --help >/dev/null
      - name: Smoke test (daemon code path)
        working-directory: cli
        run: |
          OUTPUT=$(PUB_DAEMON_MODE=1 ./dist-bin/pub-linux-x64 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "require.*polyfill\|cannot find\|module not found\|not resolve"; then
            echo "FAIL: daemon code path has missing/broken imports"
            exit 1
          fi
          echo "$OUTPUT" | grep -q "Missing PUB_DAEMON_BRIDGE_SETTINGS"
