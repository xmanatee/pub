name: Pub CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test-web:
    name: Lint & Test Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Generate Convex types
        run: pnpm convex codegen
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - name: Validate Convex deploy (dry-run)
        run: pnpm convex deploy --dry-run -y --codegen disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - name: Build (generates route tree + type checks)
        run: pnpm build
      - run: pnpm test
      - name: Run Knip
        run: pnpm knip

  lint-and-test-cli:
    name: Lint & Test CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Smoke test linux binary
        run: |
          VERSION="$(node --print "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"
          ACTUAL="$(PUBBLUE_SKIP_UPDATE_CHECK=1 ./dist-bin/pubblue-linux-x64 --version)"
          test "$ACTUAL" = "$VERSION"
          PUBBLUE_SKIP_UPDATE_CHECK=1 ./dist-bin/pubblue-linux-x64 --help >/dev/null
