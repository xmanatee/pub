name: Pub CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    name: Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Convex codegen
        run: pnpm convex codegen
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - name: Convex deploy (dry-run)
        run: pnpm convex deploy --dry-run -y --codegen disable
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm knip

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Smoke test
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ACTUAL=$(PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --version)
          test "$ACTUAL" = "$VERSION"
          PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --help >/dev/null
      - name: Smoke test (daemon code path)
        run: |
          OUTPUT=$(PUB_DAEMON_MODE=1 ./dist-bin/pub-linux-x64 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "require.*polyfill\|cannot find\|module not found\|not resolve"; then
            echo "FAIL: daemon code path has missing/broken imports"
            exit 1
          fi
          echo "$OUTPUT" | grep -q "Missing PUB_DAEMON_BRIDGE_MODE"
