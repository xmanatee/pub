name: CLI Binary Release

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint CLI
        run: pnpm lint

      - name: Test CLI
        run: pnpm test

      - name: Verify release tag matches CLI version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node --print "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"
          if [ "$TAG" != "cli-v$VERSION" ]; then
            echo "Tag $TAG does not match cli/package.json version $VERSION" >&2
            exit 1
          fi

      - name: Build binaries (cross-compile)
        run: pnpm build

      - name: Smoke test linux binary
        run: |
          VERSION="$(node --print "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"
          ACTUAL="$(PUBBLUE_SKIP_UPDATE_CHECK=1 ./dist-bin/pubblue-linux-x64 --version)"
          test "$ACTUAL" = "$VERSION"
          PUBBLUE_SKIP_UPDATE_CHECK=1 ./dist-bin/pubblue-linux-x64 --help >/dev/null

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/dist-bin/pubblue-*
          generate_release_notes: true
