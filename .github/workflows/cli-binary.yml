name: CLI Binary Release

on:
  push:
    branches: [main]
    paths:
      - "cli/package.json"

permissions:
  contents: write

jobs:
  check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          VERSION=$(node -p "require('./cli/package.json').version")
          if git ls-remote --tags origin "refs/tags/cli-v$VERSION" | grep -q .; then
            echo "cli-v$VERSION already released"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build & Release
    needs: check
    if: needs.check.outputs.version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Smoke test
        run: |
          ACTUAL=$(PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --version)
          test "$ACTUAL" = "${{ needs.check.outputs.version }}"
          PUB_SKIP_UPDATE_CHECK=1 ./dist-bin/pub-linux-x64 --help >/dev/null
      - name: Smoke test (daemon code path)
        run: |
          OUTPUT=$(PUB_DAEMON_MODE=1 ./dist-bin/pub-linux-x64 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi "require.*polyfill\|cannot find\|module not found\|not resolve"; then
            echo "FAIL: daemon code path has missing/broken imports"
            exit 1
          fi
          echo "$OUTPUT" | grep -q "Missing PUB_DAEMON_BRIDGE_SETTINGS"
      - name: Tag and release
        run: |
          git tag "cli-v${{ needs.check.outputs.version }}"
          git push origin "cli-v${{ needs.check.outputs.version }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.check.outputs.version }}
          files: cli/dist-bin/pub-*
          generate_release_notes: true
