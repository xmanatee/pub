services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend@sha256:a08c5b766c3df6e3051ce6e89382335a71299563e6b934b48b9c05cb63452df6  # pinned 2026-03-23
    volumes:
      - convex-data:/convex/data
    environment:
      - IS_TEST=true
      - CONVEX_CLOUD_ORIGIN=http://convex-backend:3210
      - CONVEX_SITE_ORIGIN=http://convex-backend:3211
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  # One-shot: generate admin key from backend's data volume, write to shared volume
  admin-key-gen:
    image: ghcr.io/get-convex/convex-backend@sha256:a08c5b766c3df6e3051ce6e89382335a71299563e6b934b48b9c05cb63452df6  # pinned 2026-03-23
    depends_on:
      convex-backend:
        condition: service_healthy
    volumes:
      - convex-data:/convex/data
      - shared-data:/shared
    entrypoint:
      - sh
      - -c
      - |
        KEY=$$(./generate_admin_key.sh)
        echo "$$KEY" > /shared/admin-key
    restart: "no"

  turn-server:
    image: coturn/coturn:4.6-alpine
    command:
      - -n
      - --realm=pub-e2e
      - --listening-ip=0.0.0.0
      - --listening-port=3478
      - --min-port=49152
      - --max-port=49200
      - --user=e2e-user:e2e-pass
      - --lt-cred-mech
      - --no-tls
      - --no-dtls
      - --log-file=stdout
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -u -w1 127.0.0.1 3478"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 2s

  test-runner:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
      target: test-runner
    init: true
    ipc: host
    depends_on:
      convex-backend:
        condition: service_healthy
      admin-key-gen:
        condition: service_completed_successfully
      turn-server:
        condition: service_healthy
    volumes:
      - shared-data:/shared:ro
      - test-results:/app/test-results
      - playwright-report:/app/playwright-report
    environment:
      - CONVEX_URL=http://convex-backend:3210
      - CONVEX_SITE_URL=http://convex-backend:3211
      - CONVEX_PROXY_URL=http://localhost:3212
      - CONVEX_HOST=convex-backend
      - BASE_URL=http://localhost:3000
      - IS_TEST=true
      - TURN_HOST=turn-server
      - TURN_PORT=3478
      - TURN_USER=e2e-user
      - TURN_PASS=e2e-pass
      - FORCE_TURN_RELAY=1
      # Mock LLM (shared by openclaw, claude-code, claude-sdk bridges)
      - MOCK_LLM_URL=http://localhost:4100
      # Claude Code / Claude SDK bridges → point at mock LLM
      - ANTHROPIC_BASE_URL=http://localhost:4100
      - ANTHROPIC_API_KEY=test-key-not-real
      # Mock relay (claude-channel bridge)
      - MOCK_RELAY_SOCKET=/tmp/pub-mock-relay.sock
      - MOCK_RELAY_URL=http://localhost:4101
      # Mock command (openclaw-like bridge)
      - MOCK_COMMAND_RULES_FILE=/tmp/mock-command-rules.json
      - MOCK_COMMAND_PATH=/app/tests/e2e/mock-bridge-command/command.mjs
      # Tunnel relay (tunnel proxy E2E)
      - TUNNEL_RELAY_URL=http://localhost:4102
      - TUNNEL_RELAY_PORT=4102
      - TUNNEL_RELAY_ADMIN_PORT=4103

volumes:
  convex-data:
  shared-data:
  test-results:
  playwright-report:
