services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    volumes:
      - convex-data:/convex/data
    environment:
      - IS_TEST=true
      - CONVEX_CLOUD_ORIGIN=http://convex-backend:3210
      - CONVEX_SITE_ORIGIN=http://convex-backend:3211
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  # One-shot: generate admin key from backend's data volume, write to shared volume
  admin-key-gen:
    image: ghcr.io/get-convex/convex-backend:latest
    depends_on:
      convex-backend:
        condition: service_healthy
    volumes:
      - convex-data:/convex/data
      - shared-data:/shared
    entrypoint:
      - sh
      - -c
      - |
        KEY=$$(./generate_admin_key.sh)
        echo "$$KEY" > /shared/admin-key
    restart: "no"

  test-runner:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
      target: test-runner
    init: true
    ipc: host
    depends_on:
      convex-backend:
        condition: service_healthy
      admin-key-gen:
        condition: service_completed_successfully
    volumes:
      - shared-data:/shared:ro
      - test-results:/app/test-results
      - playwright-report:/app/playwright-report
    environment:
      - CONVEX_URL=http://convex-backend:3210
      - CONVEX_SITE_URL=http://convex-backend:3211
      - CONVEX_PROXY_URL=http://localhost:3212
      - CONVEX_HOST=convex-backend
      - BASE_URL=http://localhost:3000
      - IS_TEST=true

volumes:
  convex-data:
  shared-data:
  test-results:
  playwright-report:
