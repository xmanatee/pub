services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    ports:
      - "3210:3210"
      - "3211:3211"
    environment:
      - IS_TEST=true
      - CONVEX_CLOUD_ORIGIN=http://localhost:3210
      - CONVEX_SITE_ORIGIN=http://localhost:3211
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  frontend:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
      target: frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_CONVEX_URL=http://convex-backend:3210
    depends_on:
      convex-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  test-runner:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile
      target: test-runner
    init: true
    ipc: host
    environment:
      - CONVEX_URL=http://convex-backend:3210
      - CONVEX_SITE_URL=http://convex-backend:3211
      - BASE_URL=http://frontend:3000
      - IS_TEST=true
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - test-results:/app/test-results
      - playwright-report:/app/playwright-report

volumes:
  test-results:
  playwright-report:
