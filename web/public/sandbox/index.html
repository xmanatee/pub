<!doctype html>
<html>
<head><meta charset="utf-8"><title>Pub Sandbox</title></head>
<body>
<script>
(function () {
  var PARENT_SOURCE = "pub-parent";
  var SANDBOX_SOURCE = "pub-sandbox";
  var swReady = false;
  var handshakeStarted = false;
  var keepaliveTimer = null;
  var keepaliveListener = null;
  var controllerChangeListener = null;

  function cleanupHandshake() {
    if (keepaliveTimer) {
      clearInterval(keepaliveTimer);
      keepaliveTimer = null;
    }
    if (keepaliveListener) {
      navigator.serviceWorker.removeEventListener("message", keepaliveListener);
      keepaliveListener = null;
    }
    if (controllerChangeListener) {
      navigator.serviceWorker.removeEventListener("controllerchange", controllerChangeListener);
      controllerChangeListener = null;
    }
    handshakeStarted = false;
  }

  function signalReady() {
    if (swReady) return;
    swReady = true;
    cleanupHandshake();
    parent.postMessage({ type: "sandbox-ready", source: SANDBOX_SOURCE }, "*");
  }

  function pingController() {
    var controller = navigator.serviceWorker && navigator.serviceWorker.controller;
    if (!controller) return false;
    controller.postMessage({ type: "keepalive" });
    return true;
  }

  function startHandshake() {
    if (swReady || handshakeStarted || !("serviceWorker" in navigator)) return;
    handshakeStarted = true;
    keepaliveListener = function (event) {
      if (event.data && event.data.type === "keepalive-ack") {
        signalReady();
      }
    };
    controllerChangeListener = function () {
      pingController();
    };
    navigator.serviceWorker.addEventListener("message", keepaliveListener);
    navigator.serviceWorker.addEventListener("controllerchange", controllerChangeListener);
    pingController();
    keepaliveTimer = setInterval(function () {
      pingController();
    }, 100);
  }

  function registerSW() {
    if (!("serviceWorker" in navigator)) {
      console.error("[sandbox] Service workers not supported");
      return;
    }
    // SW at /__sandbox__/sw.js (dev) or /sw.js (prod), always scoped to /
    // Service-Worker-Allowed: / header allows scope beyond the SW script's directory
    var swPath = location.pathname.indexOf("/__sandbox__/") === 0 ? "/__sandbox__/sw.js" : "/sw.js";
    navigator.serviceWorker
      .register(swPath, { scope: "/" })
      .then(function () {
        startHandshake();
      })
      .catch(function (err) {
        console.error("[sandbox] SW registration failed:", err);
      });

    if (navigator.serviceWorker.controller) {
      startHandshake();
    }
  }

  // Relay pub-fs-request from the SW to the parent page.
  // Must live here — navigator.serviceWorker listeners survive document.write().
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.addEventListener("message", function (e) {
      if (e.data && e.data.type === "pub-fs-request") {
        parent.postMessage(e.data, "*", e.ports);
      }
    });
  }

  // Initial inject-content handler — receives the first content injection from the parent.
  // After document.write(), the injected bridge script re-registers this handler via
  // window.__pubInjectHandler so subsequent updates are received.
  var injectHandler = function (ev) {
    var data = ev.data;
    if (!data || data.source !== PARENT_SOURCE) return;
    if (data.type === "inject-content" && typeof data.html === "string") {
      document.open();
      document.write(data.html);
      document.close();
    }
  };
  window.__pubInjectHandler = injectHandler;
  window.addEventListener("message", injectHandler);

  registerSW();
})();
</script>
</body>
</html>
