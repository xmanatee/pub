<!doctype html>
<html>
<head><meta charset="utf-8"><title>Pub Sandbox</title></head>
<body>
<script>
(function () {
  var PARENT_SOURCE = "pub-parent";
  var SANDBOX_SOURCE = "pub-sandbox";
  var swReady = false;

  function signalReady() {
    if (swReady) return;
    swReady = true;
    parent.postMessage({ type: "sandbox-ready", source: SANDBOX_SOURCE }, "*");
  }

  function registerSW() {
    if (!("serviceWorker" in navigator)) {
      console.error("[sandbox] Service workers not supported");
      return;
    }
    navigator.serviceWorker
      .register("./sw.js")
      .then(function (reg) {
        if (reg.active) {
          signalReady();
          return;
        }
        var worker = reg.installing || reg.waiting;
        if (worker) {
          worker.addEventListener("statechange", function () {
            if (worker.state === "activated") signalReady();
          });
        }
        reg.addEventListener("updatefound", function () {
          var newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener("statechange", function () {
              if (newWorker.state === "activated") signalReady();
            });
          }
        });
      })
      .catch(function (err) {
        console.error("[sandbox] SW registration failed:", err);
      });

    if (navigator.serviceWorker.controller) {
      signalReady();
    }
  }

  window.addEventListener("message", function (ev) {
    var data = ev.data;
    if (!data || data.source !== PARENT_SOURCE) return;
    if (data.type === "inject-content" && typeof data.html === "string") {
      document.open();
      document.write(data.html);
      document.close();
    }
  });

  registerSW();
})();
</script>
</body>
</html>
